<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase de Invitado</title>
    <style>
        /* Estilo general */
        body {
            font-family: 'Poppins', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #e09, #ffdde1);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenedor del pase */
        .pase {
            border: 2px solid #fff;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: left;
            position: relative;
            animation: fadeIn 1.2s ease-in-out;
        }

        /* Animación de entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Título del evento */
        .evento {
            font-size: 1.8em;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
            color: #e63946;
        }

        /* Detalles */
        .detalle {
            margin: 10px 0;
            font-size: 1.1em;
        }

        .detalle strong {
            color: #e63946;
        }

        /* Botón para descargar */
        .boton {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #e63946;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .boton:hover {
            background-color: #d62828;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="pase">
        <div class="evento">XV Años de Ana</div>
        <div class="detalle"><strong>Invitado:</strong> <span id="nombre"></span></div>
        <div class="detalle"><strong>Mesa:</strong> <span id="mesa"></span></div>
        <div class="detalle"><strong>Fecha:</strong> 20 de diciembre de 2024</div>
        <div class="detalle"><strong>Hora:</strong> 7:00 PM</div>
        <div class="detalle"><strong>Lugar:</strong> Salón Las Rosas</div>
    </div>

    <script>
        // Obtén el ID del invitado desde la URL
        const params = new URLSearchParams(window.location.search);
        const invitadoID = params.get("invitado");

        // Datos de prueba con mesas asignadas
        const invitados = {
            "001": { nombre: "María López", mesa: "Mesa 1" },
            "002": { nombre: "Juan Pérez", mesa: "Mesa 2" },
            "003": { nombre: "Ana Martínez", mesa: "Mesa 3" }
        };

        // Inserta los datos en la página
        if (invitadoID && invitados[invitadoID]) {
            document.getElementById("nombre").textContent = invitados[invitadoID].nombre;
            document.getElementById("mesa").textContent = invitados[invitadoID].mesa;
        } else {
            document.body.innerHTML = "<h1>Invitado no encontrado</h1>";
        }
    </script>
</body>
</html>
